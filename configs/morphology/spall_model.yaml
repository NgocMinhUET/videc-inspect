# Spall morphology priors for ViDEC-Inspect v0.2.

version: 0.2
class: spall

area_distribution:
  type: lognormal
  mean_log_m2: -5.5
  std_log: 0.7
  clip_m2: [0.0008, 0.08]

depth_distribution:
  type: lognormal
  mean_log_mm: 1.8
  std_log: 0.6
  clip_mm: [2.0, 35.0]

boundary_irregularity:
  num_vertices_range: [6, 14]
  radial_perturb_std: [0.10, 0.30]

edge_chipping:
  probability_by_severity:
    minor: 0.20
    moderate: 0.45
    severe: 0.70
  notch_count_range: [1, 6]
  notch_size_fraction: [0.05, 0.18]

internal_roughness:
  base_amplitude: 0.15
  exposed_aggregate_probability_by_severity:
    minor: 0.10
    moderate: 0.35
    severe: 0.70
  exposed_rebar_probability_by_severity:
    minor: 0.0
    moderate: 0.05
    severe: 0.25

depth_bowl:
  # Bowl profile parameterized as d(r) = depth_mm * max(0, 1 - r^p)^q
  shape_exponent_p_range: [1.5, 3.5]
  shape_exponent_q_range: [0.5, 1.5]

severity_thresholds:
  method: depth_based
  minor:    { max_depth_mm: 5.0 }
  moderate: { min_depth_mm: 5.0, max_depth_mm: 20.0 }
  severe:   { min_depth_mm: 20.0 }
